[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "B", "UP"]

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["gradlint"]
src_paths = ["crates/py/python"]

[tool.pytest.ini_options]
testpaths = ["tests"]
