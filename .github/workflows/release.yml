name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Optional package index publish after artifacts pass smoke test"
        type: choice
        default: none
        options:
          - none
          - testpypi
          - pypi

permissions:
  contents: read

env:
  MATURIN_VERSION: v1.11.5

jobs:
  wheels:
    name: Wheels (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            interpreter: python3.10
            manylinux: "2_28"
          - os: ubuntu-latest
            python: "3.11"
            interpreter: python3.11
            manylinux: "2_28"
          - os: ubuntu-latest
            python: "3.12"
            interpreter: python3.12
            manylinux: "2_28"
          - os: ubuntu-latest
            python: "3.13"
            interpreter: python3.13
            manylinux: "2_28"
          - os: macos-15
            python: "3.10"
            interpreter: python
            manylinux: "off"
          - os: macos-15
            python: "3.11"
            interpreter: python
            manylinux: "off"
          - os: macos-15
            python: "3.12"
            interpreter: python
            manylinux: "off"
          - os: macos-15
            python: "3.13"
            interpreter: python
            manylinux: "off"
          - os: macos-latest
            python: "3.10"
            interpreter: python
            manylinux: "off"
          - os: macos-latest
            python: "3.11"
            interpreter: python
            manylinux: "off"
          - os: macos-latest
            python: "3.12"
            interpreter: python
            manylinux: "off"
          - os: macos-latest
            python: "3.13"
            interpreter: python
            manylinux: "off"
          - os: windows-latest
            python: "3.10"
            interpreter: python
            manylinux: "off"
          - os: windows-latest
            python: "3.11"
            interpreter: python
            manylinux: "off"
          - os: windows-latest
            python: "3.12"
            interpreter: python
            manylinux: "off"
          - os: windows-latest
            python: "3.13"
            interpreter: python
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: ${{ env.MATURIN_VERSION }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            -m crates/py/Cargo.toml
            -i ${{ matrix.interpreter }}
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          maturin-version: ${{ env.MATURIN_VERSION }}
          args: --out dist -m crates/py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  smoke-test:
    name: Smoke test built wheel
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true
      - name: Install wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist "gradlint"
      - name: Import and CLI smoke test
        run: |
          python -c "import gradlint; print(gradlint.__version__, gradlint.core_version())"
          gradlint -v
          gradlint inspect --help

  cli:
    name: CLI binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --locked --release -p gradlint-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf gradlint-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release gradlint
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gradlint.exe `
            -DestinationPath gradlint-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            gradlint-${{ matrix.target }}.tar.gz
            gradlint-${{ matrix.target }}.zip
          if-no-files-found: ignore

  github-release:
    name: GitHub Release
    needs: [smoke-test, cli]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/python-wheels-*/*.whl
            artifacts/python-sdist/*.tar.gz
            artifacts/cli-*/*
          generate_release_notes: true

  testpypi-publish:
    name: Publish to TestPyPI
    needs: [smoke-test]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gradlint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi-publish:
    name: Publish to PyPI
    needs: [smoke-test]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish_target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gradlint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
