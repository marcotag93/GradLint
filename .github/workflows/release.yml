name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Optional package index publish after artifacts pass smoke test"
        type: choice
        default: none
        options:
          - none
          - testpypi
          - pypi

permissions:
  contents: read

env:
  MATURIN_VERSION: v1.11.5

jobs:
  wheels:
    name: Wheels (${{ matrix.target }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            interpreter: python3.10
            manylinux: "2_28"
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: "3.11"
            interpreter: python3.11
            manylinux: "2_28"
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: "3.12"
            interpreter: python3.12
            manylinux: "2_28"
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: "3.13"
            interpreter: python3.13
            manylinux: "2_28"
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            python: "3.10"
            interpreter: python
            manylinux: "off"
            target: x86_64-apple-darwin
          - os: macos-15
            python: "3.11"
            interpreter: python
            manylinux: "off"
            target: x86_64-apple-darwin
          - os: macos-15
            python: "3.12"
            interpreter: python
            manylinux: "off"
            target: x86_64-apple-darwin
          - os: macos-15
            python: "3.13"
            interpreter: python
            manylinux: "off"
            target: x86_64-apple-darwin
          - os: macos-15
            python: "3.10"
            interpreter: python
            manylinux: "off"
            target: aarch64-apple-darwin
          - os: macos-15
            python: "3.11"
            interpreter: python
            manylinux: "off"
            target: aarch64-apple-darwin
          - os: macos-15
            python: "3.12"
            interpreter: python
            manylinux: "off"
            target: aarch64-apple-darwin
          - os: macos-15
            python: "3.13"
            interpreter: python
            manylinux: "off"
            target: aarch64-apple-darwin
          - os: windows-latest
            python: "3.10"
            interpreter: python
            manylinux: "off"
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            python: "3.11"
            interpreter: python
            manylinux: "off"
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            python: "3.12"
            interpreter: python
            manylinux: "off"
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            python: "3.13"
            interpreter: python
            manylinux: "off"
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: ${{ env.MATURIN_VERSION }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            -m crates/py/Cargo.toml
            -i ${{ matrix.interpreter }}
            --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.target }}-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          maturin-version: ${{ env.MATURIN_VERSION }}
          args: --out dist -m crates/py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  validate-artifacts:
    name: Validate Python distributions
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: python-*
      - name: Prepare distributions
        run: |
          mkdir -p dist
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -e "dist/$name" ]; then
              echo "Duplicate distribution filename: $name" >&2
              exit 1
            fi
            cp "$file" "dist/$name"
          done < <(find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print0 | sort -z)
          if ! ls dist/* >/dev/null 2>&1; then
            echo "No Python distributions found" >&2
            exit 1
          fi
          ls -l dist
      - name: Check archives
        run: |
          python -m pip install --upgrade pip twine
          python - <<'PY'
          from pathlib import Path
          import struct
          import tarfile
          import zipfile

          dist = Path("dist")
          for path in sorted(dist.iterdir()):
              if path.suffix == ".whl":
                  data = path.read_bytes()
                  marker = b"PK\x05\x06"
                  start = max(0, len(data) - 65557)
                  eocd = data.rfind(marker, start)
                  if eocd == -1:
                      raise SystemExit(f"{path.name}: missing ZIP end-of-central-directory")
                  comment_len = struct.unpack_from("<H", data, eocd + 20)[0]
                  expected_end = eocd + 22 + comment_len
                  if expected_end != len(data):
                      raise SystemExit(f"{path.name}: ZIP archive has trailing data")
                  with zipfile.ZipFile(path) as zf:
                      bad = zf.testzip()
                  if bad:
                      raise SystemExit(f"{path.name}: corrupt ZIP member {bad}")
              elif path.name.endswith(".tar.gz"):
                  with tarfile.open(path, "r:gz") as tf:
                      tf.getmembers()
          PY
          python -m twine check dist/*

  smoke-test:
    name: Smoke test built wheel
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: python-*
      - name: Prepare distributions
        run: |
          mkdir -p dist
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -e "dist/$name" ]; then
              echo "Duplicate distribution filename: $name" >&2
              exit 1
            fi
            cp "$file" "dist/$name"
          done < <(find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print0 | sort -z)
          ls -l dist
      - name: Install wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install --find-links dist "gradlint"
      - name: Import and CLI smoke test
        run: |
          python -c "import gradlint; print(gradlint.__version__, gradlint.core_version())"
          gradlint -v
          gradlint inspect --help

  cli:
    name: CLI binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --locked --release -p gradlint-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf gradlint-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release gradlint
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gradlint.exe `
            -DestinationPath gradlint-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            gradlint-${{ matrix.target }}.tar.gz
            gradlint-${{ matrix.target }}.zip
          if-no-files-found: ignore

  github-release:
    name: GitHub Release
    needs: [smoke-test, validate-artifacts, cli]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p release-artifacts
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -e "release-artifacts/$name" ]; then
              echo "Duplicate release asset filename: $name" >&2
              exit 1
            fi
            cp "$file" "release-artifacts/$name"
          done < <(find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z)
          mapfile -t files < <(find release-artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' -o -name '*.zip' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --generate-notes
          fi
          for file in "${files[@]}"; do
            gh release upload "$tag" "$file" --clobber
          done

  testpypi-publish:
    name: Publish to TestPyPI
    needs: [smoke-test, validate-artifacts]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gradlint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: python-*
      - name: Prepare distributions
        run: |
          mkdir -p dist
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -e "dist/$name" ]; then
              echo "Duplicate distribution filename: $name" >&2
              exit 1
            fi
            cp "$file" "dist/$name"
          done < <(find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print0 | sort -z)
          ls -l dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  pypi-publish:
    name: Publish to PyPI
    needs: [smoke-test, validate-artifacts]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish_target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gradlint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: python-*
      - name: Prepare distributions
        run: |
          mkdir -p dist
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -e "dist/$name" ]; then
              echo "Duplicate distribution filename: $name" >&2
              exit 1
            fi
            cp "$file" "dist/$name"
          done < <(find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print0 | sort -z)
          ls -l dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
