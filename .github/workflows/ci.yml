name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (core + cli)
        run: cargo clippy --workspace --all-targets --exclude gradlint-py -- -D warnings
      - name: Clippy (py bindings)
        run: cargo clippy -p gradlint-py -- -D warnings
      - name: Test
        run: cargo test --workspace --exclude gradlint-py

  python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip maturin
          maturin build -m crates/py/Cargo.toml --out dist
      - name: Install
        run: |
          pip install "gradlint[dev]" --find-links dist
          pip install gradlint --force-reinstall --no-deps --no-index --find-links dist
      - name: Lint
        run: |
          ruff check crates/py/python tests
          black --check crates/py/python tests
          isort --check-only crates/py/python tests
      - name: Test
        run: pytest
